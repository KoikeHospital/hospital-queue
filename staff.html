<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【スタッフ用】小池病院 管理画面</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #333; color: white; padding: 20px; }
        .card { background: #444; padding: 30px; border-radius: 20px; max-width: 400px; margin: 0 auto; border: 2px solid #555; }
        .number { font-size: 80px; font-weight: bold; color: #4ade80; margin: 20px 0; }
        button { width: 100%; padding: 20px; font-size: 20px; cursor: pointer; border: none; border-radius: 12px; color: white; margin: 10px 0; font-weight: bold; }
        .btn-next { background-color: #28a745; }
        .btn-issue { background-color: #ff8c00; }
        .btn-reset { background-color: #dc3545; margin-top: 30px; font-size: 14px; width: auto; padding: 10px 20px; opacity: 0.8; }
    </style>
</head>
<body>
    <h1>管理パネル</h1>
    <div class="card">
        <p>現在の呼出番号</p>
        <div id="current-number" class="number">--</div>
        <p id="wait-count">待ち人数: --人</p>
    </div>

    <div style="max-width: 400px; margin: 30px auto;">
        <button class="btn-next" onclick="nextPatient()">次の方を呼ぶ</button>
        <button class="btn-issue" onclick="issueNumber()">新規番号発行</button>
        
        <button class="btn-reset" onclick="resetNumbers()">本日の番号をリセット</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://liopumnwbwrdjzhfrlat.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_0xpjBtea0HTyp69_TpYvuA_YHqQg7cX';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function updateDisplay() {
            const { data } = await supabaseClient.from('Koike_HP').select('*').eq('id', 1).single();
            if (data) {
                document.getElementById('current-number').innerText = data.current_number + '番';
                document.getElementById('wait-count').innerText = (data.total_count - data.current_number) + '人';
            }
        }

        async function nextPatient() {
            const { data } = await supabaseClient.from('Koike_HP').select('current_number').eq('id', 1).single();
            await supabaseClient.from('Koike_HP').update({ current_number: data.current_number + 1 }).eq('id', 1);
        }

        async function issueNumber() {
            const { data } = await supabaseClient.from('Koike_HP').select('total_count').eq('id', 1).single();
            await supabaseClient.from('Koike_HP').update({ total_count: data.total_count + 1 }).eq('id', 1);
        }

        // リセット機能
        async function resetNumbers() {
            if (confirm("本日の受付番号を1番にリセットしますか？")) {
                const { error } = await supabaseClient
                    .from('Koike_HP')
                    .update({ current_number: 1, total_count: 1 })
                    .eq('id', 1);
                
                if (error) alert("リセットに失敗しました");
            }
        }

        supabaseClient.channel('staff-channel')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'Koike_HP' }, () => {
                updateDisplay();
            })
            .subscribe();

        updateDisplay();
    </script>
</body>
</html>
